<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hank的 AR 體驗</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; }
        model-viewer { width: 100%; height: 100%; }
        #ar-button {
            background-color: #111111; color: white; border-radius: 8px; border: 1px solid #333;
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            padding: 12px 24px; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <model-viewer src="your-model.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1">
        <button slot="ar-button" id="ar-button">
            📱 點擊在現實中擺放
        </button>
    </model-viewer>

</body>
</html>
